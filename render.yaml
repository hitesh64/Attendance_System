services:
  - type: web
    name: smart-attendance-system
    env: python
    buildCommand: "bash build.sh"
    startCommand: "streamlit run app.py --server.port $PORT --server.address 0.0.0.0"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: MONGO_URI
        sync: false

services:
  - type: web
    name: smart-attendance-system
    env: python
    buildCommand: "export CMAKE_BUILD_PARALLEL_LEVEL=1 && pip install cmake && pip install -r requirements.txt"
    startCommand: "streamlit run app.py --server.port $PORT --server.address 0.0.0.0"
    envVars:
      - key: MONGO_URI
        sync: false
